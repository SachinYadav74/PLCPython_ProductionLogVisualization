<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PLC Production Statistics</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #0d6efd;
            --success: #1e7e34;
            --danger: #c82333;
            --bg: #f4f6f9;
            --card: #ffffff;
            --text: #212529;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
        }

        header {
            background: var(--card);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        header h1 {
            font-size: 22px;
            margin: 0;
        }

        .status {
            font-weight: 600;
            color: var(--success);
        }

        .container {
            padding: 30px;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .card h3 {
            margin: 0;
            font-size: 14px;
            color: #6c757d;
            font-weight: 600;
        }

        .card .value {
            font-size: 32px;
            font-weight: 700;
            margin-top: 10px;
        }

        .ok { color: var(--success); }
        .nok { color: var(--danger); }

        .charts {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        footer {
            margin-top: 30px;
            text-align: center;
            color: #6c757d;
            font-size: 13px;
        }

        @media (max-width: 900px) {
            .charts {
                grid-template-columns: 1fr;
            }
        }
        button {
            border: none;
            background: #e9ecef;
            padding: 6px 12px;
            font-size: 18px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #dee2e6;
        }
    </style>
</head>
<body>

<header>
    <h1>PLC Production Dashboard</h1>
    <div class="status">● PLC Connected</div>
</header>

<div class="container">

    <!-- KPI Section -->
    <div class="kpi-grid">
        <div class="card">
            <h3>Station Number</h3>
            <div class="value" style="display:flex;align-items:center;gap:15px;">
            <button onclick="changeStation(-1)">&#9664;</button>
            <span id="station"></span>
            <button onclick="changeStation(1)">&#9654;</button>
        </div>

        </div>

        <div class="card">
            <h3>Total Parts</h3>
            <div class="value" id="total_parts">--</div>
        </div>

        <div class="card">
            <h3>OK Parts</h3>
            <div class="value ok" id="ok_parts">--</div>
        </div>

        <div class="card">
            <h3>NOT OK Parts</h3>
            <div class="value nok" id="nok_parts">--</div>
        </div>

        <div class="card">
            <h3>Average Cycle Time (s)</h3>
            <div class="value" id="avg_cycle">--</div>
        </div>
    </div>

    <!-- Charts -->
    <div class="charts">
        <div class="card">
            <h3>Production Trend</h3>
            <canvas id="trendChart"></canvas>
        </div>

        <div class="card">
            <h3>Quality Distribution</h3>
            <canvas id="qualityChart"></canvas>
        </div>
    </div>

    <footer>
        PLC Statistics Dashboard | Updated every 5 seconds
    </footer>

</div>

<script>
    const trendCtx = document.getElementById('trendChart').getContext('2d');
    const qualityCtx = document.getElementById('qualityChart').getContext('2d');
    let trendChart = new Chart(trendCtx, {
    type: 'bar',
    data: {
        labels: ['Station 1', 'Station 2', 'Station 3', 'Station 4', 'Station 5'],
        datasets: [{
            label: 'Parts Count',
            data: [0, 0, 0, 0, 0]
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});

     let qualityChart = new Chart(qualityCtx, {
        type: 'doughnut',
        data: {
            labels: ['OK', 'NOT OK'],
            datasets: [{
                data: [0, 0]
            }]
        }
    });
    async function fetchData() {
        try {
            const response = await fetch('/api/stats');
            const data = await response.json();
            console.log(data)
            document.getElementById('station').innerText = data.station;
            document.getElementById('total_parts').innerText = data.total_parts;
            document.getElementById('ok_parts').innerText = data.ok_parts;
            document.getElementById('nok_parts').innerText = data.nok_parts;
            document.getElementById('avg_cycle').innerText = data.avg_cycle_time.toFixed(2);

            trendChart.data.datasets[0].data = data.station_counts;
            trendChart.update();

            qualityChart.data.datasets[0].data = [data.ok_parts, data.nok_parts];
            qualityChart.update();

        } catch (err) {
            console.error('API error:', err);
        }
    }

    let currentStation = 1;

    function changeStation(direction) {
        let newStation = currentStation + direction;

        if (newStation < 1 || newStation > 5) {
            return;
        }

        fetch('/api/station', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ station: newStation })
        });

        currentStation = newStation;
        document.getElementById('station').innerText = currentStation;
    }


    fetchData();
    setInterval(fetchData, 5000);
</script>
</body>
</html>
